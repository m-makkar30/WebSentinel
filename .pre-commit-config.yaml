# See https://pre-commit.com for usage. Install hooks with: pre-commit install
#
# Tooling split (see commit body / docs):
#   - Python: ruff (lint) + black (format)
#   - Web/docs: prettier
#   - eslint is added in the frontend-scaffold commit (it needs the project's
#     flat config + TS/React plugins, which don't exist yet).
minimum_pre_commit_version: "3.5.0"

default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: [--fix]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        # eslint is intentionally not here yet — see header comment.
        files: \.(jsx?|tsx?|css|scss|html|md|markdown|json|ya?ml)$
