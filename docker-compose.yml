# WebSentinel — base stack.
#
# This commit defines the datastores: PostgreSQL (with pgvector) and Redis.
# Application services (Django API, Celery worker + beat, Playwright fetch
# worker, frontend) are added in later commits and join this same network.
#
#   cp .env.example .env   # then fill in values
#   docker compose up -d postgres redis
#
# Values are read from .env; the ${VAR:-default} fallbacks keep
# `docker compose config` working even without one.

name: websentinel

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-websentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-websentinel}
      POSTGRES_DB: ${POSTGRES_DB:-websentinel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs once on an empty data dir: enables the pgvector extension.
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-websentinel} -d ${POSTGRES_DB:-websentinel}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://websentinel:websentinel@postgres:5432/websentinel}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Dev convenience: live code reload via runserver.
      - ./backend:/app
    command:
      ["sh", "-c", "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c ''import urllib.request; urllib.request.urlopen("http://localhost:8000/healthz").read()''',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://websentinel:websentinel@postgres:5432/websentinel}
    command: ["celery", "-A", "websentinel", "worker", "-l", "info"]
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A websentinel inspect ping -t 10 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://websentinel:websentinel@postgres:5432/websentinel}
    command: ["celery", "-A", "websentinel", "beat", "-l", "info"]
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  fetch-worker:
    build:
      context: ./backend
      dockerfile: ../docker/fetch.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://websentinel:websentinel@postgres:5432/websentinel}
      # Playwright's sync API leaves an asyncio loop in the worker thread, which
      # trips Django's async-safety guard on the (genuinely synchronous) ORM
      # writes that follow a render. Safe to disable here: this worker is sync.
      DJANGO_ALLOW_ASYNC_UNSAFE: "true"
    # Consumes the `fetch` queue; runs Chromium via Playwright.
    command:
      [
        "celery",
        "-A",
        "websentinel",
        "worker",
        "-l",
        "info",
        "-Q",
        "fetch",
        "-n",
        "fetch@%h",
        "--concurrency=2",
      ]
    volumes:
      - ./backend:/app
    # Chromium needs more shared memory than Docker's 64MB default.
    shm_size: "1gb"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A websentinel inspect ping -t 10 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    environment:
      # Vite proxies /api to the backend over the compose network.
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      # Keep the image's installed node_modules (don't shadow with the mount).
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
