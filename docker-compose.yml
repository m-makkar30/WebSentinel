# WebSentinel — base stack.
#
# This commit defines the datastores: PostgreSQL (with pgvector) and Redis.
# Application services (Django API, Celery worker + beat, Playwright fetch
# worker, frontend) are added in later commits and join this same network.
#
#   cp .env.example .env   # then fill in values
#   docker compose up -d postgres redis
#
# Values are read from .env; the ${VAR:-default} fallbacks keep
# `docker compose config` working even without one.

name: websentinel

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-websentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-websentinel}
      POSTGRES_DB: ${POSTGRES_DB:-websentinel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs once on an empty data dir: enables the pgvector extension.
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-websentinel} -d ${POSTGRES_DB:-websentinel}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
